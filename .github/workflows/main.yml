name: Selenium Test Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Initialize Test Environment
        run: |
          echo "Initializing Selenium Test Environment"
          mkdir -p reports logs screenshots

      - name: Execute Selenium Test Suite (Mock - 360 Test Cases)
        run: |
          echo "Starting Selenium Test Execution"
          echo "TestCase,Status,ExecutionTime(ms)" > reports/selenium_results.csv

          PASS_COUNT=0
          FAIL_COUNT=0

          for i in {1..360}
          do
            RAND=$((RANDOM % 100))
            TIME=$((RANDOM % 900 + 100))

            if [ $RAND -lt 85 ]; then
              STATUS="PASS"
              PASS_COUNT=$((PASS_COUNT + 1))
            else
              STATUS="FAIL"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              echo "Screenshot for TC_$i" > screenshots/TC_$i.png
            fi

            echo "TC_$i,$STATUS,$TIME" >> reports/selenium_results.csv
          done

          echo "TOTAL_PASS=$PASS_COUNT" >> $GITHUB_ENV
          echo "TOTAL_FAIL=$FAIL_COUNT" >> $GITHUB_ENV

      - name: Generate Execution Summary
        run: |
          echo "Generating Test Summary"
          echo "Total Test Cases: 360"
          echo "Passed: $TOTAL_PASS"
          echo "Failed: $TOTAL_FAIL"

      - name: Simulate Report Generation (HTML)
        run: |
          echo "<html><body>" > reports/report.html
          echo "<h1>Selenium Automation Report</h1>" >> reports/report.html
          echo "<p>Total: 360</p>" >> reports/report.html
          echo "<p>Passed: $TOTAL_PASS</p>" >> reports/report.html
          echo "<p>Failed: $TOTAL_FAIL</p>" >> reports/report.html
          echo "</body></html>" >> reports/report.html

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: reports/

      - name: Upload Screenshots (Failures)
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/

      - name: Final Status Check
        run: |
          if [ "$TOTAL_FAIL" -gt 20 ]; then
            echo "Build Failed due to high failure rate"
            exit 1
          else
            echo "Build Passed"
          fi
